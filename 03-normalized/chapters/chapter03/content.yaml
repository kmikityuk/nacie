  style: Caption
- type: paragraph
  text: '{FIG_REF:chapter03_005} FPS layout.'
  style: Caption
- type: heading
  level: 2
  text: Fuel Bundle Instrumentation
  style: Heading 2
- type: paragraph
  text: Pins No. 1, 2, 4, 5, 6, 7, 9, 16, 18, and 19 are instrumented with wall-embedded thermocouples
    located on one or more generatrices parallel to the pin axis, as summarized in {TAB_REF:chapter03_003}
    and illustrated in {FIG_REF:chapter03_006}. Three axial measurement levels are considered, at z =
    38, 300, and 562 mm measured from the bottom of the active pin region, as shown in {FIG_REF:chapter03_006}(a).
    By convention, the measurement planes at z = 38, 300, and 562 mm are referred to as Sections A, B,
    and C, respectively.
  style: Normal
- type: paragraph
  text: The selected measurement sections share the same geometrical configuration, since the wire pitch
    is Pw = 262 mm, which corresponds to the axial distances between successive sections (300 − 38 mm
    and 562 − 300 mm). In addition, Pin No. 3 is instrumented along a single generatrix with 13 wall-embedded
    thermocouples distributed over the active length, spaced every Pw /6 = 43.66 mm starting from z =
    38 mm.
  style: Normal
- type: paragraph
  text: Subchannels S2, S5, S22, S26, and S33 are instrumented with bulk thermocouples of 0.5 mm diameter
    at the same three measurement sections A, B, and C (see {TAB_REF:chapter03_004}). A schematic view
    of a generic measurement section, including both wall-embedded thermocouples and instrumented subchannels,
    is shown in {FIG_REF:chapter03_006} (b). The relative positions of the grooves, i.e., the generatrices
    (highlighted in red) for the different pins, can also be inferred by considering the reference azimuthal
    pin angle θ, defined as positive in the anticlockwise direction when the bundle cross section is viewed
    from the top.
  style: Normal
- type: paragraph
  text: '{TAB_REF:chapter03_005} summarizes all the relevant information associated with the thermocouples,
    including the pin or wire number, thermocouple type (‘Wall’ or ‘Bulk’), thermocouple diameter, subchannel
    number for bulk thermocouples, azimuthal angle, axial z location measured from the beginning of the
    active region, and the corresponding measurement section (A, B, or C). In cases where the information
    is not defined, the symbol “–” is used.'
  style: Normal
- type: paragraph
  text: '{FIG_REF:chapter03_006}: Axial (a) and section (b) locations of wall embedded and bulk TCs for
    pins n. 1,3, 2, 4, 5, 6, 7, 9, 16, 18, 19.'
  style: Caption
