  style: Normal
- type: heading
  level: 2
  text: Loop Instrumentation
  style: Heading 2
- type: paragraph
  text: The loop instrumentation includes several thermocouples. The thermocouples are inserted into the
    primary and secondary loops through Swagelok fittings and therefore directly measure the coolant temperature
    (LBE or water).
  style: Normal
- type: paragraph
  text: 'The thermocouple identification is defined as follows:'
  style: Normal
- type: paragraph
  text: 'for the primary loop: TP-101, TP-102, TP-103, TP-104, TP-105, TP-106, TP-107, and TP-310;

    for the secondary loop, the thermocouples relevant for the benchmark are those located at the inlet
    and outlet of the main section of the heat exchanger, namely TP-203 and TP-204.'
  style: Normal
- type: paragraph
  text: The thermocouple positions can be inferred from the NACIE-UP layout and the corresponding NACIE-UP
    P&ID included in this document (see Appendix B). All thermocouples have a diameter of 3 mm and are
    K-type, Class 1. Accordingly, their accuracy, in compliance with IEC 60584-3 (2007), is ±1.5 °C in
    the temperature range from −40 °C to +375 °C and ±0.004·t from 375 °C to 1000 °C.
  style: Normal
- type: paragraph
  text: In addition, the cover gas pressure in the expansion tank is monitored by the Barksdale pressure
    transducer P110. The overall measurement chain error for the thermocouples has been independently
    verified.
  style: Normal
- type: heading
  level: 2
  text: Thermal Flow Meter
  style: Heading 2
- type: paragraph
  text: A prototypical thermal flow meter (FM101) was used to measure the LBE mass flow rate in the loop.
    The thermal flow meter is based on the energy balance and it is shown schematically in {FIG_REF:chapter03_003}.
  style: Normal
- type: paragraph
  text: '{FIG_REF:chapter03_003}: Schematic view of the thermal flow meter.'
  style: Caption
- type: paragraph
  text: 'The component is made by a flanged pipe (SS) with an heater developed by Thermocoax (6 kW maximum
    power), a static mixer, 2 Resistance Temperature Detector (RTD) and an internal RTD in the bulb. The
    mass flow rate will be computed by the thermal balance:'
  style: Normal
- type: table
  id: TAB:chapter03_002
  caption: '{TAB_CAP:chapter03_002} Thermal conductivity (k) of the thermal insulator'
  file: tables/chapter03_table_002.yaml
- type: paragraph
  text: Under steady-state conditions, Eq. (1) yields an accurate evaluation of the mass flow rate. During
    transient operation, the bulb heater is actively regulated to maintain a constant temperature difference
    between the heater and the inlet RTD. In addition, an inlet–outlet temperature compensation is implemented
    to account for the fluid transit time through the 800 mm pipe. These two features, implemented within
    the Data Acquisition and Control System (DACS) of the instrument, ensure a fast and accurate response
    under transient conditions.
  style: Normal
- type: paragraph
  text: The thermal flow meter was developed at ENEA in collaboration with Thermocoax and was successfully
    tested first in water and subsequently in heavy liquid metal (HLM) during several experimental campaigns
    conducted in the NACIE facility. Compared with alternative measurement technologies, it offers the
    advantages of very low pressure losses and a very high maximum operating temperature. The instrument
    provides reliable measurements even at low HLM mass flow rates, down to 0.6 kg/s. The thermal flow
    meter operating according to a “thermal balance” principle demonstrated good stability and repeatability,
    a favorable response to transient conditions, and no requirement for calibration, as it relies on
    fundamental conservation laws.
  style: Normal
- type: paragraph
  text: For the NACIE-UP facility operating in the present configuration, the thermal flow meter FM101
    is configured to measure mass flow rates in the range from 0.6 kg/s to 10 kg/s. The correspondence
    between the electrical output signal (current) and the measured mass flow rate is 4–20 mA for 0.6–10
    kg/s. The measurement accuracy was assessed both numerically and analytically using error propagation
    theory and is estimated to be approximately 5% under the present operating conditions {REF:chapter03_local_001}.
  style: Normal
- type: paragraph
  text: The measurement chain error of the thermal flow meter was evaluated using a calibrator in place
    of the instrument. For the calibration procedure, five different current values I [mA] were considered.
    These current levels correspond to mass flow rates according to the relation . A maximum error of
    0.1% of the instrument full scale was deemed acceptable. The measurement chain error was assessed
    and found to be negligible, remaining below 0.1% of full scale.
  style: Normal
- type: paragraph
  text: The bulb heater power applied during the experimental tests will be provided for use in the simulations.
  style: Normal
- type: heading
  level: 2
  text: The fuel bundle simulator
  style: Heading 2
- type: paragraph
  text: The FPS consists of 19 wire-spaced electrically heated pins arranged in a triangular lattice and
    enclosed by a dedicated hexagonal wrapper. Each pin has a diameter of D = 6.55 mm and a pitch-to-diameter
    ratio (P/D) of 1.2824. The total pin length, including the non-active sections and electrical connectors,
    is 2000 mm, while the heated (active) length is 600 mm. Spacer wires are helically wrapped around
    each pin with an axial pitch of Pw = 262 mm. The maximum thermal power of the bundle is approximately
    250 kW, corresponding to a peak wall heat flux of about 1 MW/m². The main FPS design parameters are
    summarized in {TAB_REF:chapter03_002}. The pin dimensions and overall structure are representative
    of the MYRRHA fuel assembly design.
  style: Normal
- type: paragraph
  text: The main geometrical dimensions of the fuel bundle, together with an overall sketch of the cross
    section, are shown in {FIG_REF:chapter03_004}. The total flow area is conventionally subdivided into
    54 subchannels of different ranks (S1–S54). The pins and subchannels are numbered to facilitate their
    identification and the reference to the associated instrumentation.
  style: Normal
- type: paragraph
  text: The inner rank consists of the central pin No. 1 and subchannels S1–S6; the intermediate rank
    includes pins No. 2–7 and subchannels S7–S24; the outer rank (N) is formed by pins No. 8–19 and subchannels
    S25–S54.
  style: Normal
- type: paragraph
  text: The overall layout of the fuel pin bundle simulator, including its main dimensions, is illustrated
    in {FIG_REF:chapter03_005} and provided separately. In addition, a detailed drawing of a single pin
    with the spacer wire is supplied. At the pin foot, a bottom grid is installed to maintain the structural
    integrity of the bundle, while the conical section allows elastic bending of the pins, which is required
    for the correct installation of the electrical connectors. A drawing of the bottom grid, which is
    the only component required for numerical fluid-dynamics modeling, is provided separately to the participants.
  style: Normal
- type: paragraph
  text: '{TAB_REF:chapter03_002}: FPS design parameters'
  style: Caption
- type: table
  id: TAB:chapter03_003
  caption: '{TAB_CAP:chapter03_003} : FPS design parameters'
  file: tables/chapter03_table_003.yaml
