- type: heading
  level: 2
  text: Heat Exchanger
  style: Heading 2
- type: paragraph
  text: 'The heat exchanger is of the shell-and-tube type and is designed to transfer thermal power up
    to 250 kW. It consists of two separate shell sections: a low-power crossflow section (0–30 kW) and
    a high-power counter-current section (30–250 kW), both connected to the pressurized-water secondary
    side. The two sections can be independently drained and filled (see {FIG_REF:chapter03_001} and {FIG_REF:chapter03_002}).
    The tube geometry follows a “tube-in-tube” configuration, with an annular gap of 2.45 mm filled with
    AISI 316 powder.'
  style: Normal
- type: paragraph
  text: The secondary side is a closed-loop pressurized water circuit operating at 16 bar and equipped
    with a circulation pump, a pre-heater, the shell side of the heat exchanger, an air cooler, and a
    pressurizer. An ultrasonic flow meter installed between the air cooler and the pump is used to monitor
    the secondary water mass flow rate, while several thermocouples measure temperatures throughout the
    loop. The combination of these measurements allows the thermal power exchanged in each heat exchanger
    section to be quantified. All geometrical details of the heat exchanger and the secondary loop can
    be derived from the drawings provided in Appendix B.
  style: Normal
- type: paragraph
  text: In the three experiments discussed in this report, only the high-power counter-current section
    of the heat exchanger is utilized. The counter-current flow arrangement simplifies the thermo-fluid-dynamic
    modeling of the heat exchanger.
  style: Normal
- type: heading
  level: 2
  text: Gap Thermal Conductivity
  style: Heading 2
- type: paragraph
  text: The heat exchanger features double walls filled with AISI stainless-steel powder; therefore, an
    accurate numerical modeling of the heat exchanger is essential to correctly predict the average LBE
    temperature in the loop under all the investigated operating conditions. A technical drawing of the
    heat exchanger is provided in {FIG_REF:chapter03_007}.
  style: Normal
- type: paragraph
  text: '{FIG_REF:chapter03_007} Technical drawing of the Heat Exchanger.'
  style: Caption
- type: paragraph
  text: During the blind phase of a previous benchmark conducted within the SESAME project, the predicted
    average temperatures were significantly lower than the corresponding experimental values for all three
    tests. As illustrated in {FIG_REF:chapter03_008} for Test-3, the simulated average temperature remains
    well below the measured value throughout the entire test duration, with deviations ranging from approximately
    50 to 30 °C relative to the experimental data.
  style: Normal
- type: paragraph
  text: '{FIG_REF:chapter03_008}: Comparison of the average loop temperature (blind simulation and experimental
    data, Test-3).'
  style: Caption
- type: paragraph
  text: This inconsistency made a more detailed analysis of the previous heat exchanger (HX) “blind model”
    adopted in the SESAME benchmark mandatory. Consequently, a refined assessment of the overall heat-transfer
    performance of the HX component was performed. In particular, the re-evaluation focused on the thermal
    conductivity of the stainless-steel powder filling the 2.45 mm gap. This contribution accounts for
    nearly 50% of the total thermal resistance of the HX and therefore has a major impact on the global
    heat-transfer performance and, ultimately, on the mean temperature of the loop.
  style: Normal
- type: paragraph
  text: Based on more reliable experimental data {REF:chapter03_local_002}, it was concluded that the
    powder thermal conductivity assumed in the blind simulations was overestimated. The powder thermal
    conductivity reported in {REF:chapter03_local_002} is summarized in {FIG_REF:chapter03_009}, which
    shows experimental correlations as a function of temperature for three increasing powder compaction
    levels, denoted as RUN 0.0, 1.0, and 5.0 (dotted lines). The figure also includes the thermal conductivity
    adopted in the blind RELAP5 simulations (blue line) and the updated value used in the post-test RELAP5
    analyses (red line).
  style: Normal
- type: paragraph
  text: 'A systematic post-test analysis performed with RELAP5 {REF:chapter03_local_003} allowed an analytical
    expression for the powder thermal conductivity to be derived, which is strongly recommended for adoption
    in the present benchmark:'
  style: Normal
- type: table
  id: TAB:chapter03_007
  caption: '{TAB_CAP:chapter03_007} : Thermocouples names with all the relevant information associated.'
  file: tables/chapter03_table_007.yaml
- type: paragraph
  text: where T is in °C and k in W/(m*K).
  style: Normal
- type: paragraph
  text: This assumption is more consistent with the currently available experimental data and provides
    a more accurate representation of the HX thermal performance and, more generally, of the system behavior.
    Regarding the assumptions on the HX geometrical parameters, such as heat-transfer surfaces and double-wall
    tube thicknesses, these were taken directly from the design drawings {REF:chapter03_local_004}.
  style: Normal
- type: paragraph
  text: '{FIG_REF:chapter03_009}: Stainless steel powder thermal conductivity.'
  style: Caption
- type: heading
  level: 2
  text: The Gas Injection System
  style: Heading 2
- type: paragraph
  text: The gas injection device currently installed and used during the experimental tests is composed
    of a 12.70 mm (1/2 inch) outer-diameter pipe, 6135 mm in length, which is inserted through the 2½″
    coupling flange located at the top of the expansion tank by means of a Swagelok tube fitting. Technical
    drawings of the terminal section of the device, including its functional dimensions, are shown in
    {FIG_REF:chapter03_010}.
  style: Normal
- type: paragraph
  text: The gas is discharged through five holes, each with a diameter of 1 mm, aligned along a generatrix
    of four short outlet pipes (five holes per pipe). The four short pipes are arranged in a plane perpendicular
    to the main 6135 mm pipe and are mutually oriented at 90° with respect to each other {REF:chapter03_local_005}.
  style: Normal
- type: paragraph
  text: '{FIG_REF:chapter03_010}: Technical drawings of the gas injection device.'
  style: Normal
- type: paragraph
  text: With regard to the gas injection system, the control unit allows the argon volumetric flow rate
    to be set. However, the resulting void fraction α in the NACIE-UP primary circuit cannot be determined
    a priori, and therefore the pressure head provided to the loop cannot be directly estimated in advance.
    It is well established that the relationship between the injected argon volumetric flow rate and the
    resulting LBE mass flow rate in the primary circuit is non-linear.
  style: Normal
- type: paragraph
  text: In addition, the gas injection system exhibits intrinsic operational limitations related to this
    non-linear behavior. At high gas mass flow rates, the pumping capability approaches saturation, and
    the overall efficiency of the system decreases.
  style: Normal
- type: heading
  level: 2
  text: Expansion vessel
  style: Heading 2
- type: paragraph
  text: The expansion vessel is located at the top of the riser and is partially filled with argon, which
    acts as a cover gas to control the pressure in the primary circuit. Two level sensors, LD102 and LD101,
    are installed inside the expansion vessel at 80 mm and 180 mm, respectively, above the riser outlet
    nozzle.
  style: Normal
- type: paragraph
  text: During circuit filling, the LBE level is above the LD102 sensor (LD102 active) but below the LD101
    sensor (LD101 inactive). Nevertheless, LBE levels reaching the LD101 position are still acceptable
    for facility operation. The low-level sensor (LD102) is positioned 150 mm from the top of the incoming
    vertical nozzle (i.e., 150 + 285 = 435 mm from the bottom of the expansion vessel), while the high-level
    sensor (LD101) is located 230 mm from the top of the same nozzle. A cross-sectional view of the expansion
    vessel (S101) is shown in {FIG_REF:chapter03_011}.
  style: Normal
- type: paragraph
  text: '{FIG_REF:chapter03_011}: cross-section of expansion vessel.'
  style: Caption
- type: heading
  level: 2
  text: Data acquisition and control system
  style: Heading 2
- type: paragraph
  text: The Data Acquisition and Control System (DACS) is implemented using LabVIEW System Design Software
    in combination with National Instruments hardware. Both the primary and secondary systems of the NACIE-UP
    facility are remotely controlled, and the filling and draining operations of the plant are also performed
    remotely. {FIG_REF:chapter03_012} presents the control and monitoring interface used to remotely actuate
    components and valves, from which temperatures and pressures in the primary and secondary systems
    are continuously monitored.
  style: Normal
- type: paragraph
  text: '{FIG_REF:chapter03_013} shows the remote-control panel dedicated to the activation and regulation
    of power generation. The power level, the number of energized pins, and the power ramp rate can be
    adjusted as required, as illustrated in the same figure. In addition, all wall and bulk thermocouples
    within the fuel pin bundle simulator can be continuously monitored through the interface shown in
    {FIG_REF:chapter03_014}. Each pin can be controlled independently, enabling the execution of asymmetric
    heating tests for code validation purposes. Transitions between different power levels can also be
    performed through controlled power ramps.'
  style: Normal
- type: paragraph
  text: '{FIG_REF:chapter03_012}: Remote control panel of the NACIE-UP facility.'
  style: Normal
- type: paragraph
  text: '{FIG_REF:chapter03_013}: Control panel of the Fuel Pin simulator power.'
  style: Normal
- type: paragraph
  text: '{FIG_REF:chapter03_014}: Monitoring panel of the FPS temperatures.'
  style: Normal
