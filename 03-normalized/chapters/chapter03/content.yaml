- type: heading
  level: 1
  text: Description of the NACIE-UP facility
  style: Heading 1
- type: heading
  level: 2
  text: Basic Description of NACIE-UP facility
  style: Heading 2
- type: paragraph
  text: The NACIE-UP facility is a rectangular loop composed of two vertical pipes (inner diameter 62.68
    mm), with an overall height of approximately 7.7 m, and two horizontal pipes (inner diameter 62.68
    mm) each 2.4 m in length. A prototypical wire-spaced fuel pin bundle simulator (FPS) is installed
    in the lower section of the riser. The FPS and its associated instrumentation are described in detail
    in subsequent sections. A heat exchanger (HX) is located in the upper portion of the downcomer, as
    illustrated in {FIG_REF:chapter03_001}; a comprehensive description of the HX is provided later. The
    vertical distance between the center of the heated section and the center of the heat exchanger, H,
    is 5.5 m. For the experiments discussed in this work, only the high-power section of the heat exchanger
    was employed.
  style: Normal
- type: paragraph
  text: An argon gas injection system is installed within the riser to provide the driving force required
    to maintain forced convection in the loop. The system consists of a pipe with an inner diameter of
    9 mm and a total length of 6135 mm, starting from the 2½″ coupling flange located at the top of the
    expansion tank and terminating in a hook-shaped pipe with an inner diameter of 4.35 mm.
  style: Normal
- type: paragraph
  text: The primary system is instrumented with eight bulk thermocouples (TP101–TP107 and TP310) to measure
    the fluid temperature along the flow path of the loop. The thermocouple locations are shown in {FIG_REF:chapter03_002}.
    The FPS test section is equipped with a total of 67 thermocouples, arranged to monitor different subchannel
    ranks at various axial and radial positions.
  style: Normal
- type: paragraph
  text: The primary loop is also thermally insulated with a mineral rock-wool layer bonded by a thermosetting
    resin. The thermal conductivity of the resin is temperature dependent, as reported in {TAB_REF:chapter03_001}
    (manufacturer-provided data). The insulation thickness is 100 mm along the entire loop.
  style: Normal
- type: paragraph
  text: '{TAB_REF:chapter03_001} Thermal conductivity (k) of the thermal insulator'
  style: Caption
